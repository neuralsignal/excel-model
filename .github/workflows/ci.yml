name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          locked: false
      - run: pixi run lint
      - run: pixi run format-check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          locked: false
      - name: Run tests with coverage
        run: pixi run test-cov
