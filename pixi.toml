[workspace]
channels = ["conda-forge"]
name = "excel-model"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.2" # x-release-please-version

[dependencies]
python = ">=3.12,<3.15"
python-build = ">=1.4.0,<2"
hatchling = ">=1.28.0,<2"

[pypi-dependencies]
excel-model = {path = ".", editable = true}
openpyxl = ">=3.1,<4"
polars = ">=1.0,<2"
pyyaml = ">=6.0,<7"
strictyaml = ">=1.3,<2"
dacite = ">=1.8,<2"
click = ">=8.0,<9"
pytest = ">=8.0,<9"
hypothesis = ">=6.100,<7"
ruff = ">=0.11,<1"
pytest-cov = ">=5.0,<6"
pre-commit = ">=4.0,<5"
mkdocs = ">=1.6,<2"
mkdocs-material = ">=9.5,<10"
mkdocstrings = {version = ">=0.29,<1", extras = ["python"]}

[tasks]
lint = "ruff check excel_model/ tests/"
format-check = "ruff format --check excel_model/ tests/"
format = "ruff format excel_model/ tests/"
test = "pytest tests/ -v --tb=short"
test-cov = "pytest tests/ -v --tb=short --cov=excel_model --cov-report=term-missing"
docs-build = "mkdocs build"
docs-serve = "mkdocs serve"
